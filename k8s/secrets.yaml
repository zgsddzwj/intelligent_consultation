# =============================================================================
# Secret 模板 — 请勿将真实密钥提交到版本库
#
# 生产环境请使用 kubectl 创建 Secret，例如：
#
#   kubectl create secret generic medical-secrets \
#     --namespace=medical-consultation \
#     --from-literal=POSTGRES_USER='postgres' \
#     --from-literal=POSTGRES_PASSWORD='<强密码>' \
#     --from-literal=POSTGRES_DB='medical_consultation' \
#     --from-literal=NEO4J_USER='neo4j' \
#     --from-literal=NEO4J_PASSWORD='<强密码>' \
#     --from-literal=QWEN_API_KEY='<你的API密钥>' \
#     --from-literal=SECRET_KEY='<随机JWT密钥>' \
#     --from-literal=METRICS_ACCESS_TOKEN='<随机令牌>' \
#     --from-literal=LANGFUSE_PUBLIC_KEY='<可选>' \
#     --from-literal=LANGFUSE_SECRET_KEY='<可选>' \
#     --from-literal=OBJECT_STORAGE_ACCESS_KEY='<minio-access-key>' \
#     --from-literal=OBJECT_STORAGE_SECRET_KEY='<minio-secret-key>'
#
# 本地测试可临时应用下方占位 Secret（部署前务必替换）：
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: medical-secrets
  namespace: medical-consultation
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "medical_consultation"
  REDIS_PASSWORD: ""
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "REPLACE_ME"
  QWEN_API_KEY: "REPLACE_ME"
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
  SECRET_KEY: "REPLACE_ME"
  METRICS_ACCESS_TOKEN: "REPLACE_ME"
  ENCRYPTION_KEY: ""
  OBJECT_STORAGE_ACCESS_KEY: "REPLACE_ME"
  OBJECT_STORAGE_SECRET_KEY: "REPLACE_ME"
