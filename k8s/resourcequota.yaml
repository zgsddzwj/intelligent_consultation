# =============================================================================
# ResourceQuota - 命名空间资源配额
# 限制命名空间内的资源使用总量，防止单个命名空间耗尽集群资源
# =============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: medical-quota
  namespace: medical-consultation
spec:
  hard:
    # 计算资源限制
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    # 存储限制
    requests.storage: 100Gi
    persistentvolumeclaims: "10"
    # 对象数量限制
    pods: "30"
    services: "15"
    secrets: "20"
    configmaps: "10"

---
# =============================================================================
# LimitRange - 默认资源限制
# 为没有显式设置资源限制的 Pod 提供默认值
# =============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: medical-limits
  namespace: medical-consultation
spec:
  limits:
    # 默认容器资源限制
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4000m"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    # PVC 存储限制
    - type: PersistentVolumeClaim
      max:
        storage: 50Gi
      min:
        storage: 1Gi
