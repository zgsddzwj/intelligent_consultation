name: CI/CD Pipeline - 极致优化版

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  # ========== 代码质量检查 ==========
  code-quality-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies (with dev extras)
        working-directory: ./backend
        run: uv sync --extra dev --frozen

      - name: Run black format check
        working-directory: ./backend
        run: uv run black --check app/

      - name: Run isort check
        working-directory: ./backend
        run: uv run isort --check-only app/

      - name: Run flake8 lint
        working-directory: ./backend
        run: uv run flake8 app/ --max-line-length=120 --ignore=E501,W503 --statistics

      - name: Run mypy type check
        working-directory: ./backend
        run: uv run mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run bandit security scan
        working-directory: ./backend
        run: |
          uv run bandit -r app/ -f json -o bandit-report.json || true
          uv run bandit -r app/ -ll

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: ./backend/bandit-report.json
          if-no-files-found: ignore

  code-quality-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Run Prettier check
        working-directory: ./frontend
        run: npx prettier --check "src/**/*.{ts,tsx,css}"
        continue-on-error: true

      - name: Run security audit
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ========== 后端测试 ==========
  test-backend:
    needs: [code-quality-backend]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies (with dev extras)
        working-directory: ./backend
        run: uv sync --extra dev --frozen

      - name: Run unit tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
          SECRET_KEY: test-secret-key-for-ci
          QWEN_API_KEY: test-key
          STARTUP_FAIL_FAST: "false"
          RATE_LIMIT_ENABLED: "false"
        run: |
          uv run pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term --cov-fail-under=40 -n auto --timeout=60

      - name: Run integration tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
          SECRET_KEY: test-secret-key-for-ci
          QWEN_API_KEY: test-key
          STARTUP_FAIL_FAST: "false"
          RATE_LIMIT_ENABLED: "false"
        run: |
          uv run pytest tests/integration/ -v --timeout=120

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: backend-coverage
          fail_ci_if_error: false

      - name: Generate coverage report
        working-directory: ./backend
        run: |
          uv run coverage html -d coverage_html

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./backend/coverage_html

  # ========== 前端测试 ==========
  test-frontend:
    needs: [code-quality-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build production
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./frontend/dist

  # ========== 容器冒烟测试 ==========
  compose-smoke-test:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smoke_db
          POSTGRES_USER: smoke_user
          POSTGRES_PASSWORD: smoke_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t medical-backend:ci ./backend

      - name: Start backend container
        run: |
          docker run -d --name medical-backend-smoke \
            --network host \
            -e DATABASE_URL=postgresql://smoke_user:smoke_pass@localhost:5432/smoke_db \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e ENVIRONMENT=testing \
            -e SECRET_KEY=smoke-test-secret-key \
            -e QWEN_API_KEY=smoke-test-key \
            -e STARTUP_FAIL_FAST=false \
            -e RATE_LIMIT_ENABLED=false \
            -e ENABLE_AUTH_MIDDLEWARE=false \
            medical-backend:ci

      - name: Wait for health endpoints
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/live && curl -sf http://localhost:8000/ready; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 3
          done
          echo "Backend failed smoke test"
          docker logs medical-backend-smoke
          exit 1

      - name: Stop smoke container
        if: always()
        run: docker rm -f medical-backend-smoke || true

  # ========== 性能测试 ==========
  performance-test:
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies (with dev extras)
        working-directory: ./backend
        run: uv sync --extra dev --frozen

      - name: Run performance benchmark
        working-directory: ./backend
        run: |
          uv run pytest tests/ -k "benchmark" -v || true

  # ========== 构建与发布 ==========
  build-images:
    needs: [test-backend, test-frontend, compose-smoke-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-*.sarif

  # ========== 版本发布 ==========
  release:
    needs: [build-images]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
